name: CI

on:
  push:
    branches: [ main, 'feature/**', 'agent/**' ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install ruff pytest

    - name: Lint with Ruff
      run: |
        ruff check .
        ruff format --check .

    - name: Run tests
      run: |
        python -m pytest tests/ -q --tb=no

    - name: Sync Kanban (olivia-dev auto-adjust for sprints)
      run: |
        # Placeholder for CI/CD auto-kanban flow
        # In future: python scripts/kanban-maintain.py --sync-from SCHEDULE.md --update skills/nyxelle/SKILL.md kanban/*.md
        # This will automatically adjust Nyxelle's kanban and relevant planning files on sprint completion
        echo "Kanban sync step (auto-adjust for Nyxelle persona and sprints) - to be implemented with olivia-dev discipline"