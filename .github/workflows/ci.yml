name: CI

on:
  push:
    branches: [ main, 'feature/**', 'agent/**' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        # Needed for subsequent push of auto-kanban updates
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install ruff pytest

    - name: Lint with Ruff
      run: |
        ruff check .
        ruff format --check .

    - name: Run tests
      run: |
        python -m pytest tests/ -q --tb=no

    - name: Sync Kanban (Nyxelle auto-adjust + olivia-dev discipline)
      run: |
        python scripts/kanban-maintain.py --sync --current 0.1
        echo "Nyxelle kanban + Liv/Bunny boards + planning files auto-adjusted from SCHEDULE.md"

    - name: Commit kanban updates back (main pushes only)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add skills/nyxelle/SKILL.md kanban/liv-kanban.md kanban/bunny-kanban.md README.md || true
        if git diff --cached --quiet; then
          echo "Kanban already in sync — no commit needed."
        else
          git commit -m "chore(ci): auto-adjust Nyxelle + kanbans from SCHEDULE.md (Tiered sprints) [skip ci]"
          git push
          echo "Pushed auto-adjusted kanban + Nyxelle persona updates as part of CI/CD flow."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
